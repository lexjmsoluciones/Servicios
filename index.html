<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios Legales</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@1.9.6/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a202c;
            color: #cbd5e0;
        }
        .silver {
            color: #d4d4d4;
        }
    </style>
</head>
<body>
    <header class="bg-gray-800 p-5 flex justify-between items-center">
        <img src="path/to/logo.png" alt="Logo" class="h-10">
        <h1 class="text-2xl silver">Identidad Profesional</h1>
    </header>

    <main class="p-5">
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="p-4 bg-gray-700 rounded-lg">
                <h2 class="text-xl silver">Penal</h2>
            </div>
            <div class="p-4 bg-gray-700 rounded-lg">
                <h2 class="text-xl silver">Amparo</h2>
            </div>
            <div class="p-4 bg-gray-700 rounded-lg">
                <h2 class="text-xl silver">Familiar</h2>
            </div>
            <div class="p-4 bg-gray-700 rounded-lg">
                <h2 class="text-xl silver">Derechos Humanos</h2>
            </div>
            <div class="p-4 bg-gray-700 rounded-lg">
                <h2 class="text-xl silver">Laboral</h2>
            </div>
            <div class="p-4 bg-gray-700 rounded-lg">
                <h2 class="text-xl silver">Civil</h2>
            </div>
            <div class="p-4 bg-gray-700 rounded-lg">
                <h2 class="text-xl silver">Mercantil</h2>
            </div>
            <div class="p-4 bg-gray-700 rounded-lg">
                <h2 class="text-xl silver">Protección Patrimonial</h2>
            </div>
        </section>

        <section class="mt-8 p-4 bg-gray-800 rounded-lg">
            <h2 class="text-xl silver">Contacto</h2>
            <div class="flex space-x-4 mt-2">
                <a href="https://wa.me/your_number" class="text-silver" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                <a href="https://facebook.com/your_profile" class="text-silver" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
                <a href="https://instagram.com/your_profile" class="text-silver" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="mailto:your_email@example.com" class="text-silver"><i class="fas fa-envelope"></i></a>
                <a href="https://your_maps_location" class="text-silver" aria-label="Location"><i class="fas fa-map-marker-alt"></i></a>
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 p-4 mt-8 text-center">
        <p class="silver">&copy; 2026 LexJM Soluciones. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
